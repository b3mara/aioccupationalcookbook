<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Occupational Cookbook</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap');

  :root {
    --parchment: #ede2c8;
    --parchment-dark: #ddcda3;
    --ink: #2b2018;
    --ink-soft: #4a3c2c;
    --metal: #c9cdd4;
    --metal-dark: #8a8f99;
    --panel-shadow: rgba(0,0,0,0.35);
  }

  * { box-sizing: border-box; }

  /* ---------- App shell ---------- */
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: var(--parchment);
    font-family: 'EB Garamond', serif;
    color: var(--ink);
  }

  #app {
    display: flex;
    height: 100vh;
    width: 100%;
  }

  /* ---------- LEFT: image + overlaid prompt ---------- */
  #art-panel {
    position: relative;
    flex: 0 0 auto;
    height: 100vh;
    background: var(--parchment);
    display: flex;
    align-items: flex-start;
    overflow: hidden;
  }
  #art-panel img {
    height: 100vh;
    width: auto;
    max-width: none;
    display: block;
  }
  #prompt-overlay {
    position: absolute;
    left: 5.158%;
    width: 89.566%;
    top: 78.308%;
    height: 6.345%;
    display: flex;
    align-items: center;
  }
  #profession-input {
    width: 100%;
    height: 100%;
    background: #32281E;
    border: 1px solid #6E6458;
    outline: none;
    border-radius: 999px;
    padding: 0 4%;
    font-family: 'EB Garamond', serif;
    font-size: clamp(11px, 1.4vw, 15px);
    background-image: none;
    color: #DDD6CD;
    letter-spacing: 0.02em;
  }
  #profession-input::placeholder {
    background: linear-gradient(to bottom, #DDD6CD 0%, #B8AEA2 45%, #756C62 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: rgba(184, 174, 162, 0.65);
  }
  #go-btn {
    position: absolute;
    left: 5.158%;
    width: 89.566%;
    top: 87.8%;
    height: 6.5%;
    background: transparent;
    border: none;
    cursor: pointer;
  }

  /* ---------- RIGHT: recipe / parchment panel ---------- */
  #recipe-panel {
    flex: 1 1 auto;
    display: flex;
    align-items: stretch;
    justify-content: center;
    padding: 0;
    overflow: hidden;
    background: var(--parchment);
    background-image:
      radial-gradient(ellipse at top left, rgba(0,0,0,0.035), transparent 55%),
      radial-gradient(ellipse at bottom right, rgba(0,0,0,0.04), transparent 55%);
    position: relative;
  }
  #recipe-panel::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: url('frame-ornament.png');
    background-repeat: no-repeat;
    background-position: center;
    background-size: 80% auto;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }
  #recipe-card {
    max-width: 760px;
    width: 100%;
    height: 100%;
    padding: 22px 28px 18px;
    position: relative;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  #recipe-card > * {
    position: relative;
    z-index: 1;
  }
  .recipe-title {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 1.3rem;
    letter-spacing: 0.04em;
    color: var(--ink);
    text-align: center;
    margin: 0 0 14px;
    flex: 0 0 auto;
  }
  #recipe-body {
    font-size: 1.08rem;
    line-height: 1.8;
    color: var(--ink);
    white-space: pre-wrap;
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    padding-right: 6px;
  }
  #recipe-body p { margin: 0 0 0.5em; }
  #recipe-body.loading {
    text-align: center;
    color: var(--ink-soft);
    font-style: italic;
  }
  #recipe-body.loading .dot {
    animation: dotfade 1.1s ease-in-out infinite;
    opacity: 0.15;
  }
  @keyframes dotfade {
    0%, 100% { opacity: 0.15; }
    40% { opacity: 1; }
  }
  #recipe-body::-webkit-scrollbar { width: 7px; }
  #recipe-body::-webkit-scrollbar-thumb {
    background: var(--parchment-dark);
    border-radius: 4px;
  }

  /* feedback — always present beneath the recipe */
  #feedback-row {
    margin-top: 22px;
    padding-top: 16px;
    border-top: 1px dashed rgba(74, 60, 44, 0.4);
  }
  #feedback-label {
    font-style: italic;
    color: var(--ink-soft);
    font-size: 0.92rem;
    margin: 0 0 6px;
  }
  #feedback-text {
    width: 100%;
    height: 4.4em;
    font-family: 'EB Garamond', serif;
    font-size: 1rem;
    line-height: 1.4;
    padding: 8px 10px;
    border: 1px solid var(--parchment-dark);
    border-radius: 4px;
    resize: vertical;
    background: #f7f0dd;
    color: var(--ink);
  }
  #feedback-submit {
    margin-top: 8px;
    font-family: 'EB Garamond', serif;
    font-size: 0.92rem;
    padding: 6px 16px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid var(--ink-soft);
    background: none;
    color: var(--ink-soft);
    float: right;
  }
  #feedback-submit:hover { background: rgba(74,60,44,0.08); }
  #feedback-sent {
    font-style: italic;
    font-size: 0.88rem;
    color: var(--ink-soft);
    clear: both;
    padding-top: 6px;
    display: none;
  }

  /* ---------- Back button (mobile only, shown when recipe is active) ---------- */
  #back-btn {
    display: none;
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 40;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(20,15,10,0.7);
    border: 1px solid var(--metal);
    color: var(--metal);
    font-size: 1.3rem;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  /* ---------- Mobile layout ---------- */
  @media (max-width: 760px) {
    html, body { overflow: auto; }
    #app { flex-direction: column; height: auto; min-height: 100vh; }
    #art-panel {
      flex: none;
      width: 100%;
      height: auto;
      min-height: 100vh;
      display: block;
      overflow: visible;
    }
    #art-panel img {
      width: 100%;
      height: auto;
      max-width: 100%;
    }
    #recipe-panel {
      display: none;
      padding: 70px 16px 40px;
      min-height: 100vh;
      overflow-y: visible;
    }
    #recipe-panel.active { display: flex; }
    #recipe-body { max-height: none; overflow-y: visible; }
    #art-panel.hidden { display: none; }
    #back-btn.show { display: flex; }
    #recipe-card { padding: 18px 16px 14px; }
  }
</style>
</head>
<body>

<button id="back-btn" aria-label="Back">&#8592;</button>

<div id="app">

  <div id="art-panel">
    <img src="cookbook-art.png" alt="AI Occupational Cookbook" />
    <div id="prompt-overlay">
      <input id="profession-input" type="text" placeholder="plumber, librarian, rock climber…" />
    </div>
    <button id="go-btn" aria-label="Generate recipe"></button>
  </div>

  <div id="recipe-panel">
    <div id="recipe-card">
      <p class="recipe-title" id="recipe-title">&nbsp;</p>
      <div id="recipe-body"></div>
      <!-- feedback box temporarily disabled — will return as a popup button, matching mobile/desktop L&F -->
      <div id="feedback-row" style="display:none !important;">
        <p id="feedback-label">Thoughts on this recipe?</p>
        <textarea id="feedback-text" placeholder="…"></textarea>
        <button id="feedback-submit">Submit</button>
        <p id="feedback-sent">Noted, thank you.</p>
      </div>
    </div>
  </div>

</div>

<script>
  const input = document.getElementById('profession-input');
  const goBtn = document.getElementById('go-btn');
  const artPanel = document.getElementById('art-panel');
  const recipePanel = document.getElementById('recipe-panel');
  const recipeBody = document.getElementById('recipe-body');
  const backBtn = document.getElementById('back-btn');
  const recipeTitle = document.getElementById('recipe-title');
  const feedbackRow = document.getElementById('feedback-row');
  const feedbackText = document.getElementById('feedback-text');
  const feedbackSubmit = document.getElementById('feedback-submit');
  const feedbackSent = document.getElementById('feedback-sent');

  let currentProfession = "";
  let currentRecipeId = null;
  const isMobile = () => window.matchMedia('(max-width: 760px)').matches;

  function startLoadingAnimation() {
    recipeBody.innerHTML = 'The pot is simmering<span class="dot" style="animation-delay:0s">.</span><span class="dot" style="animation-delay:0.25s">.</span><span class="dot" style="animation-delay:0.5s">.</span>';
  }
  function stopLoadingAnimation() {}

  function escapeHtml(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }
  function formatRecipe(text) {
    const lines = text.split(/\n+/).map(l => l.trim()).filter(l => l.length > 0);
    return lines
      // drop markdown headers (#, ##, etc.), horizontal rules (---), and italic-only title lines (*...*)
      .filter(l => !/^#{1,6}\s/.test(l) && !/^-{3,}$/.test(l) && !/^\*[^*]+\*$/.test(l))
      .map(l => {
        let escaped = escapeHtml(l);
        // **bold** -> <strong>, including a leading "**1.**" step marker
        escaped = escaped.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        return '<p>' + escaped + '</p>';
      })
      .join('');
  }

  async function generate() {
    const profession = input.value.trim();
    if (!profession) { input.focus(); return; }
    currentProfession = profession;

    if (isMobile()) {
      artPanel.classList.add('hidden');
      recipePanel.classList.add('active');
      backBtn.classList.add('show');
    }

    recipeTitle.textContent = profession.charAt(0).toUpperCase() + profession.slice(1);
    recipeBody.className = 'loading';
    startLoadingAnimation();
    feedbackRow.style.display = 'none';
    feedbackSent.style.display = 'none';
    feedbackText.value = '';
    recipePanel.scrollTop = 0;

    try {
      const res = await fetch('/api', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ profession })
      });
      const data = await res.json();
      stopLoadingAnimation();
      recipeBody.className = '';
      if (data.result) {
        recipeBody.innerHTML = formatRecipe(data.result);
        currentRecipeId = data.id || null;
        // feedbackRow.style.display = 'block'; // re-enable when feedback popup is rebuilt
      } else {
        recipeBody.textContent = "Error: " + (data.error || "something went wrong. Try again.");
      }
    } catch (e) {
      stopLoadingAnimation();
      recipeBody.className = '';
      recipeBody.textContent = "Request failed: " + e.message;
    }
  }

  goBtn.addEventListener('click', generate);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') generate(); });

  backBtn.addEventListener('click', () => {
    artPanel.classList.remove('hidden');
    recipePanel.classList.remove('active');
    backBtn.classList.remove('show');
  });

  feedbackSubmit.addEventListener('click', async () => {
    const comment = feedbackText.value.trim();
    if (!comment) return;
    try {
      await fetch('/api/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: currentRecipeId, profession: currentProfession, comment })
      });
      feedbackSent.style.display = 'block';
      feedbackText.value = '';
    } catch (e) { /* fail silently — not critical to the user experience */ }
  });
</script>

</body>
</html>
