<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Occupational Cookbook</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap');

  :root {
    --parchment: #ede2c8;
    --parchment-dark: #ddcda3;
    --ink: #2b2018;
    --ink-soft: #4a3c2c;
    --metal: #c9cdd4;
    --metal-dark: #8a8f99;
    --panel-shadow: rgba(0,0,0,0.35);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: #1a1410;
    font-family: 'EB Garamond', serif;
    color: var(--ink);
  }

  /* ---------- App shell ---------- */
  #app {
    display: flex;
    min-height: 100vh;
    width: 100%;
  }

  /* ---------- LEFT: image + overlaid prompt ---------- */
  #art-panel {
    position: relative;
    flex: 0 0 340px;
    width: 340px;
    background: #1a1410;
  }
  #art-panel img {
    width: 100%;
    display: block;
  }
  #prompt-overlay {
    position: absolute;
    left: 5.158%;
    width: 89.566%;
    top: 78.308%;
    height: 6.345%;
    display: flex;
    align-items: center;
  }
  #profession-input {
    width: 100%;
    height: 100%;
    background: #32281E;
    border: 1px solid #6E6458;
    outline: none;
    border-radius: 999px;
    padding: 0 4%;
    font-family: 'EB Garamond', serif;
    font-size: clamp(11px, 1.4vw, 15px);
    background-image: none;
    color: #DDD6CD;
    letter-spacing: 0.02em;
  }
  #profession-input::placeholder {
    background: linear-gradient(to bottom, #DDD6CD 0%, #B8AEA2 45%, #756C62 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: rgba(184, 174, 162, 0.65);
  }
  #go-btn {
    position: absolute;
    left: 5.158%;
    width: 89.566%;
    top: 87.8%;
    height: 6.5%;
    background: transparent;
    border: none;
    cursor: pointer;
  }

  /* ---------- RIGHT: recipe / parchment panel ---------- */
  #recipe-panel {
    flex: 1 1 auto;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 32px;
    overflow-y: auto;
  }
  #recipe-card {
    background: var(--parchment);
    background-image:
      radial-gradient(ellipse at top left, rgba(0,0,0,0.04), transparent 60%),
      radial-gradient(ellipse at bottom right, rgba(0,0,0,0.05), transparent 60%);
    border: 1px solid var(--parchment-dark);
    border-radius: 6px;
    box-shadow: 0 12px 40px var(--panel-shadow);
    max-width: 640px;
    width: 100%;
    padding: 30px 40px 28px;
    position: relative;
  }
  #recipe-card::before {
    content: "";
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(74, 60, 44, 0.25);
    border-radius: 3px;
    pointer-events: none;
  }
  .recipe-title {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 1.15rem;
    letter-spacing: 0.04em;
    color: var(--ink);
    text-align: center;
    margin: 0;
  }
  .recipe-divider {
    border: none;
    border-top: 1px dashed rgba(74, 60, 44, 0.4);
    margin: 10px 0 18px;
  }
  #recipe-body {
    font-size: 1.08rem;
    line-height: 1.8;
    color: var(--ink);
    white-space: pre-wrap;
    max-height: 52vh;
    overflow-y: auto;
    padding-right: 6px;
  }
  #recipe-body.loading {
    text-align: center;
    color: var(--ink-soft);
    font-style: italic;
  }
  #recipe-body::-webkit-scrollbar { width: 7px; }
  #recipe-body::-webkit-scrollbar-thumb {
    background: var(--parchment-dark);
    border-radius: 4px;
  }

  /* feedback — always present beneath the recipe */
  #feedback-row {
    margin-top: 22px;
    padding-top: 16px;
    border-top: 1px dashed rgba(74, 60, 44, 0.4);
  }
  #feedback-label {
    font-style: italic;
    color: var(--ink-soft);
    font-size: 0.92rem;
    margin: 0 0 6px;
  }
  #feedback-text {
    width: 100%;
    height: 4.4em;
    font-family: 'EB Garamond', serif;
    font-size: 1rem;
    line-height: 1.4;
    padding: 8px 10px;
    border: 1px solid var(--parchment-dark);
    border-radius: 4px;
    resize: vertical;
    background: #f7f0dd;
    color: var(--ink);
  }
  #feedback-submit {
    margin-top: 8px;
    font-family: 'EB Garamond', serif;
    font-size: 0.92rem;
    padding: 6px 16px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid var(--ink-soft);
    background: none;
    color: var(--ink-soft);
    float: right;
  }
  #feedback-submit:hover { background: rgba(74,60,44,0.08); }
  #feedback-sent {
    font-style: italic;
    font-size: 0.88rem;
    color: var(--ink-soft);
    clear: both;
    padding-top: 6px;
    display: none;
  }

  /* ---------- Back button (mobile only, shown when recipe is active) ---------- */
  #back-btn {
    display: none;
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 40;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(20,15,10,0.7);
    border: 1px solid var(--metal);
    color: var(--metal);
    font-size: 1.3rem;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  /* ---------- Mobile layout ---------- */
  @media (max-width: 760px) {
    #app { flex-direction: column; }
    #art-panel {
      flex: none;
      width: 100%;
      min-height: 100vh;
    }
    #recipe-panel {
      display: none;
      padding: 70px 16px 40px;
      min-height: 100vh;
    }
    #recipe-panel.active { display: flex; }
    #art-panel.hidden { display: none; }
    #back-btn.show { display: flex; }
    #recipe-card { padding: 30px 22px 26px; }
  }
</style>
</head>
<body>

<button id="back-btn" aria-label="Back">&#8592;</button>

<div id="app">

  <div id="art-panel">
    <img src="cookbook-art.png" alt="AI Occupational Cookbook" />
    <div id="prompt-overlay">
      <input id="profession-input" type="text" placeholder="plumber, librarian, rock climber…" />
    </div>
    <button id="go-btn" aria-label="Generate recipe"></button>
  </div>

  <div id="recipe-panel">
    <div id="recipe-card">
      <p class="recipe-title" id="recipe-title">Recipe for the Future</p>
      <hr class="recipe-divider" />
      <div id="recipe-body"></div>
      <div id="feedback-row" style="display:none;">
        <p id="feedback-label">Thoughts on this recipe?</p>
        <textarea id="feedback-text" placeholder="…"></textarea>
        <button id="feedback-submit">Submit</button>
        <p id="feedback-sent">Noted, thank you.</p>
      </div>
    </div>
  </div>

</div>

<script>
  const input = document.getElementById('profession-input');
  const goBtn = document.getElementById('go-btn');
  const artPanel = document.getElementById('art-panel');
  const recipePanel = document.getElementById('recipe-panel');
  const recipeBody = document.getElementById('recipe-body');
  const backBtn = document.getElementById('back-btn');
  const feedbackRow = document.getElementById('feedback-row');
  const feedbackText = document.getElementById('feedback-text');
  const feedbackSubmit = document.getElementById('feedback-submit');
  const feedbackSent = document.getElementById('feedback-sent');

  let currentProfession = "";
  let currentRecipeId = null;
  const isMobile = () => window.matchMedia('(max-width: 760px)').matches;

  async function generate() {
    const profession = input.value.trim();
    if (!profession) { input.focus(); return; }
    currentProfession = profession;

    if (isMobile()) {
      artPanel.classList.add('hidden');
      recipePanel.classList.add('active');
      backBtn.classList.add('show');
    }

    recipeBody.className = 'loading';
    recipeBody.textContent = "The pot is simmering…";
    feedbackRow.style.display = 'none';
    feedbackSent.style.display = 'none';
    feedbackText.value = '';
    recipePanel.scrollTop = 0;

    try {
      const res = await fetch('/api', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ profession })
      });
      const data = await res.json();
      recipeBody.className = '';
      if (data.result) {
        recipeBody.textContent = data.result;
        currentRecipeId = data.id || null;
        feedbackRow.style.display = 'block';
      } else {
        recipeBody.textContent = "Error: " + (data.error || "something went wrong. Try again.");
      }
    } catch (e) {
      recipeBody.className = '';
      recipeBody.textContent = "Request failed: " + e.message;
    }
  }

  goBtn.addEventListener('click', generate);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') generate(); });

  backBtn.addEventListener('click', () => {
    artPanel.classList.remove('hidden');
    recipePanel.classList.remove('active');
    backBtn.classList.remove('show');
  });

  feedbackSubmit.addEventListener('click', async () => {
    const comment = feedbackText.value.trim();
    if (!comment) return;
    try {
      await fetch('/api/feedback', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: currentRecipeId, profession: currentProfession, comment })
      });
      feedbackSent.style.display = 'block';
      feedbackText.value = '';
    } catch (e) { /* fail silently — not critical to the user experience */ }
  });
</script>

</body>
</html>
